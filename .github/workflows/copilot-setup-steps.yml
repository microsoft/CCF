name: "Copilot Setup Steps"

# Automatically run the setup steps when they are changed to allow for easy
# validation, and allow manual testing through the repository's "Actions" tab.
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

permissions: {}

jobs:
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by
  # the Copilot coding agent.
  copilot-setup-steps:
    name: "Copilot Setup Steps"
    runs-on: ubuntu-latest

    # Run in the same Azure Linux container used by CI so that the tdnf-based
    # setup scripts work and the toolchain matches the CI environment.
    container:
      image: mcr.microsoft.com/azurelinux/base/core:3.0
      options: --user root

    permissions:
      # Needed for actions/checkout to clone the repository in the setup steps.
      contents: read

    steps:
      - name: "Checkout dependencies"
        shell: bash
        run: |
          set -ex
          gpg --import /etc/pki/rpm-gpg/MICROSOFT-RPM-GPG-KEY
          tdnf -y update
          tdnf -y install ca-certificates git

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: "Install dependencies"
        shell: bash
        run: |
          set -ex
          ./scripts/setup-ci.sh
          ./scripts/setup-dev.sh
